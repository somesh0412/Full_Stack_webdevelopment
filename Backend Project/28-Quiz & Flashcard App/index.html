<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz & Flashcard App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        header h1 { font-size: 2.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .deck-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: transform 0.3s; }
        .deck-card:hover { transform: translateY(-5px); }
        .deck-card h3 { color: #333; margin-bottom: 10px; }
        .deck-card .meta { color: #666; font-size: 0.9rem; margin-bottom: 15px; }
        .deck-card .actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .btn-primary { background: #667eea; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn:hover { opacity: 0.9; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; max-width: 800px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .flashcard-container { perspective: 1000px; margin: 30px 0; }
        .flashcard { width: 100%; min-height: 250px; position: relative; transform-style: preserve-3d; transition: transform 0.6s; cursor: pointer; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .flashcard-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 30px; border-radius: 15px; font-size: 1.5rem; text-align: center; }
        .flashcard-front { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .flashcard-back { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; transform: rotateY(180deg); }
        .study-controls { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .progress { background: #e9ecef; border-radius: 10px; height: 10px; margin: 15px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 10px; transition: width 0.3s; }
        .card-input { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .card-item { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .score { text-align: center; padding: 20px; background: #f8f9fa; border-radius: 10px; margin-top: 20px; }
        .score h2 { color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 Quiz & Flashcard App</h1>
            <p>Create decks and study with flashcards</p>
        </header>

        <div style="text-align: center; margin-bottom: 30px;">
            <button class="btn btn-primary" onclick="showCreateDeck()">+ Create New Deck</button>
        </div>

        <div class="grid" id="decksGrid"></div>
    </div>

    <div class="modal" id="createModal">
        <div class="modal-content">
            <h2>Create New Deck</h2>
            <form id="deckForm">
                <div class="form-group">
                    <label>Deck Name</label>
                    <input type="text" id="deckName" required>
                </div>
                <h3>Cards</h3>
                <div id="cardsInput">
                    <div class="card-input">
                        <input type="text" placeholder="Front" class="card-front">
                        <input type="text" placeholder="Back" class="card-back">
                    </div>
                </div>
                <button type="button" class="btn btn-primary" onclick="addCardInput()" style="margin: 10px 0;">+ Add Card</button>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-success">Create Deck</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal('createModal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="studyModal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 id="studyDeckName">Studying</h2>
                <button class="btn btn-danger" onclick="closeModal('studyModal')">✕</button>
            </div>
            <div class="progress">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <p style="text-align: center; color: #666;" id="cardCounter">Card 1 of 10</p>
            
            <div class="flashcard-container">
                <div class="flashcard" id="flashcard" onclick="flipCard()">
                    <div class="flashcard-face flashcard-front" id="cardFront">Click to start</div>
                    <div class="flashcard-face flashcard-back" id="cardBack">Answer will appear here</div>
                </div>
            </div>

            <div class="study-controls">
                <button class="btn btn-primary" onclick="prevCard()">← Previous</button>
                <button class="btn btn-success" onclick="nextCard()">Next →</button>
            </div>

            <div class="score" id="studyScore" style="display: none;">
                <h2>🎉 Study Complete!</h2>
                <p>You've reviewed all cards in this deck.</p>
            </div>
        </div>
    </div>

    <script>
        let currentDeck = null;
        let currentIndex = 0;
        let isFlipped = false;

        async function loadDecks() {
            const res = await fetch('/api/decks');
            const decks = await res.json();
            const grid = document.getElementById('decksGrid');
            
            if (decks.length === 0) {
                grid.innerHTML = '<div style="text-align:center;color:white;grid-column:1/-1;"><h2>No decks yet. Create your first deck!</h2></div>';
                return;
            }

            grid.innerHTML = decks.map(d => `
                <div class="deck-card">
                    <h3>${d.name}</h3>
                    <div class="meta">${d.cards.length} cards • Reviewed ${d.reviewed || 0} times</div>
                    <div class="actions">
                        <button class="btn btn-primary" onclick="studyDeck('${d.id}')">📚 Study</button>
                        <button class="btn btn-success" onclick="shuffleDeck('${d.id}')">🔀 Shuffle</button>
                        <button class="btn btn-danger" onclick="deleteDeck('${d.id}')">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function showCreateDeck() {
            document.getElementById('createModal').classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function addCardInput() {
            const container = document.getElementById('cardsInput');
            const div = document.createElement('div');
            div.className = 'card-input';
            div.innerHTML = '<input type="text" placeholder="Front" class="card-front"><input type="text" placeholder="Back" class="card-back">';
            container.appendChild(div);
        }

        document.getElementById('deckForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fronts = document.querySelectorAll('.card-front');
            const backs = document.querySelectorAll('.card-back');
            const cards = [];
            
            for (let i = 0; i < fronts.length; i++) {
                if (fronts[i].value && backs[i].value) {
                    cards.push({ front: fronts[i].value, back: backs[i].value });
                }
            }

            if (cards.length === 0) {
                alert('Please add at least one card.');
                return;
            }

            await fetch('/api/decks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('deckName').value,
                    cards
                })
            });

            closeModal('createModal');
            e.target.reset();
            document.getElementById('cardsInput').innerHTML = '<div class="card-input"><input type="text" placeholder="Front" class="card-front"><input type="text" placeholder="Back" class="card-back"></div>';
            loadDecks();
        });

        async function studyDeck(id) {
            const res = await fetch('/api/decks');
            const decks = await res.json();
            currentDeck = decks.find(d => d.id === id);
            currentIndex = 0;
            isFlipped = false;

            document.getElementById('studyDeckName').textContent = `Studying: ${currentDeck.name}`;
            document.getElementById('studyModal').classList.add('active');
            showCard();
            document.getElementById('studyScore').style.display = 'none';
        }

        function showCard() {
            if (!currentDeck || currentIndex >= currentDeck.cards.length) {
                document.getElementById('studyScore').style.display = 'block';
                document.getElementById('flashcard').style.display = 'none';
                return;
            }

            document.getElementById('studyScore').style.display = 'none';
            document.getElementById('flashcard').style.display = 'block';
            document.getElementById('cardFront').textContent = currentDeck.cards[currentIndex].front;
            document.getElementById('cardBack').textContent = currentDeck.cards[currentIndex].back;
            document.getElementById('cardCounter').textContent = `Card ${currentIndex + 1} of ${currentDeck.cards.length}`;
            document.getElementById('progressFill').style.width = `${((currentIndex + 1) / currentDeck.cards.length) * 100}%`;
            document.getElementById('flashcard').classList.remove('flipped');
            isFlipped = false;
        }

        function flipCard() {
            isFlipped = !isFlipped;
            document.getElementById('flashcard').classList.toggle('flipped');
        }

        function nextCard() {
            if (currentIndex < currentDeck.cards.length - 1) {
                currentIndex++;
                showCard();
            } else {
                fetch(`/api/decks/${currentDeck.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reviewed: (currentDeck.reviewed || 0) + 1 })
                });
                currentIndex++;
                showCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                showCard();
            }
        }

        async function shuffleDeck(id) {
            const res = await fetch('/api/decks');
            const decks = await res.json();
            const deck = decks.find(d => d.id === id);
            
            for (let i = deck.cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck.cards[i], deck.cards[j]] = [deck.cards[j], deck.cards[i]];
            }

            await fetch(`/api/decks/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cards: deck.cards })
            });
            loadDecks();
        }

        async function deleteDeck(id) {
            if (!confirm('Delete this deck?')) return;
            await fetch(`/api/decks/${id}`, { method: 'DELETE' });
            loadDecks();
        }

        loadDecks();
    </script>
</body>
</html>
