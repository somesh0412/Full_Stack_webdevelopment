<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>✅ Task Manager</h1>
                <p class="subtitle">Organize your tasks efficiently</p>
            </div>
            <button id="addTaskBtn" class="btn btn-primary" aria-label="Add new task">
                <span class="btn-icon">+</span> Add Task
            </button>
        </header>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-number" id="totalCount">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="pendingCount">0</span>
                <span class="stat-label">Pending</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="completedCount">0</span>
                <span class="stat-label">Completed</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="urgentCount">0</span>
                <span class="stat-label">Urgent</span>
            </div>
        </div>

        <!-- Search and Filters -->
        <section class="controls-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search tasks..." aria-label="Search tasks">
            </div>
            
            <div class="filters">
                <select id="categoryFilter" aria-label="Filter by category">
                    <option value="">All Categories</option>
                    <option value="Work">💼 Work</option>
                    <option value="Personal">👤 Personal</option>
                    <option value="Shopping">🛒 Shopping</option>
                    <option value="Health">💪 Health</option>
                    <option value="Learning">📚 Learning</option>
                </select>

                <select id="priorityFilter" aria-label="Filter by priority">
                    <option value="">All Priorities</option>
                    <option value="Low">🟢 Low</option>
                    <option value="Medium">🟡 Medium</option>
                    <option value="High">🟠 High</option>
                    <option value="Urgent">🔴 Urgent</option>
                </select>

                <select id="statusFilter" aria-label="Filter by status">
                    <option value="">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
        </section>

        <!-- Main Content -->
        <main class="main-content">
            <div id="tasksList" class="tasks-list">
                <div class="empty-state">
                    <div class="empty-icon">📋</div>
                    <h3>No tasks yet</h3>
                    <p>Click "Add Task" to create your first task!</p>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Task Manager. Stay productive!</p>
        </footer>
    </div>

    <!-- Modal for adding/editing tasks -->
    <div id="taskModal" class="modal" role="dialog" aria-labelledby="modalTitle">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Task</h2>
                <button class="close-btn" id="closeBtn" aria-label="Close modal">&times;</button>
            </div>
            
            <form id="taskForm" novalidate>
                <div class="form-group">
                    <label for="taskTitle">Task Title *</label>
                    <input type="text" id="taskTitle" maxlength="150" placeholder="Enter task title" required aria-required="true">
                    <span class="error-message" id="titleError"></span>
                </div>

                <div class="form-group">
                    <label for="taskDescription">Description</label>
                    <textarea id="taskDescription" maxlength="1000" placeholder="Enter task description (optional)" rows="3"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="taskCategory">Category *</label>
                        <select id="taskCategory" required aria-required="true">
                            <option value="">Select category</option>
                            <option value="Work">💼 Work</option>
                            <option value="Personal">👤 Personal</option>
                            <option value="Shopping">🛒 Shopping</option>
                            <option value="Health">💪 Health</option>
                            <option value="Learning">📚 Learning</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="taskPriority">Priority *</label>
                        <select id="taskPriority" required aria-required="true">
                            <option value="Low">🟢 Low</option>
                            <option value="Medium" selected>🟡 Medium</option>
                            <option value="High">🟠 High</option>
                            <option value="Urgent">🔴 Urgent</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="taskDueDate">Due Date (optional)</label>
                    <input type="date" id="taskDueDate" aria-label="Task due date">
                </div>

                <div class="modal-buttons">
                    <button type="submit" id="saveBtn" class="btn btn-primary">Save Task</button>
                    <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
