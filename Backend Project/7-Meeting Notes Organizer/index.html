<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Notes Organizer</title>
  <style>
    :root{--bg:#f5f5f5;--bg-card:#fff;--text:#333;--text-secondary:#666;--accent:#4f46e5;--accent-hover:#4338ca;--success:#059669;--danger:#dc2626;--warning:#d97706;--border:#e0e0e0;--shadow:0 1px 4px rgba(0,0,0,0.1)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
    .header{background:linear-gradient(135deg,#4f46e5,#7c3aed);padding:16px 24px;color:#fff;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
    .header h1{font-size:22px}
    .search-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .search-bar input,.search-bar select{padding:8px 12px;border:1px solid rgba(255,255,255,.3);border-radius:8px;background:rgba(255,255,255,.1);color:#fff;font-size:14px}
    .search-bar input::placeholder{color:rgba(255,255,255,.7)}
    .btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:500;font-size:14px;transition:all .2s}
    .btn-white{background:#fff;color:#4f46e5}.btn-white:hover{background:#f0f0f0}
    .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
    .btn-danger{background:var(--danger);color:#fff}.btn-sm{padding:6px 12px;font-size:13px}
    .main{flex:1;display:grid;grid-template-columns:300px 1fr;overflow:hidden}
    .sidebar{background:var(--bg-card);border-right:1px solid var(--border);overflow-y:auto;padding:12px}
    .note-item{padding:12px;border-radius:8px;cursor:pointer;margin-bottom:6px;border:1px solid var(--border);transition:all .2s}
    .note-item:hover,.note-item.active{border-color:var(--accent);background:rgba(79,70,229,.05)}
    .note-item h4{font-size:14px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .note-item .meta{font-size:12px;color:var(--text-secondary)}
    .note-item .tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
    .note-item .tag{background:rgba(79,70,229,.1);color:var(--accent);padding:2px 8px;border-radius:10px;font-size:11px}
    .editor{padding:20px;overflow-y:auto}
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:13px;color:var(--text-secondary);margin-bottom:4px;font-weight:500}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px}
    .form-group textarea{resize:vertical;min-height:150px;font-family:inherit;line-height:1.6}
    .form-row{display:flex;gap:10px}.form-row>*{flex:1}
    .action-items{margin-top:16px}
    .action-item{display:flex;gap:8px;align-items:center;padding:8px;background:var(--bg);border-radius:6px;margin-bottom:6px}
    .action-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent)}
    .action-item.done span{text-decoration:line-through;color:var(--text-secondary)}
    .action-item input[type=text]{flex:1;border:none;background:none;font-size:14px}
    .action-item .remove{background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px}
    .empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-secondary);font-size:16px}
    .project-badge{display:inline-block;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600;background:rgba(5,150,105,.1);color:var(--success)}
    @media(max-width:768px){.main{grid-template-columns:1fr}.sidebar{max-height:300px;border-right:none;border-bottom:1px solid var(--border)}}
  </style>
</head>
<body>
  <div class="header">
    <h1>Meeting Notes Organizer</h1>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search notes..." oninput="loadNotes()">
      <select id="projectFilter" onchange="loadNotes()"><option value="">All Projects</option></select>
      <select id="tagFilter" onchange="loadNotes()"><option value="">All Tags</option></select>
      <button class="btn btn-white" onclick="newNote()">+ New Note</button>
    </div>
  </div>
  <div class="main">
    <div class="sidebar" id="noteList"></div>
    <div class="editor" id="editorArea">
      <div class="empty">Select or create a note to get started</div>
    </div>
  </div>
  <script>
    let notes=[],projects=[],tags=[],currentId=null;
    async function loadData(){
      notes=await(await fetch('/api/notes')).json();
      projects=await(await fetch('/api/projects')).json();
      tags=await(await fetch('/api/tags')).json();
      document.getElementById('projectFilter').innerHTML='<option value="">All Projects</option>'+projects.map(p=>`<option value="${p}">${p}</option>`).join('');
      document.getElementById('tagFilter').innerHTML='<option value="">All Tags</option>'+tags.map(t=>`<option value="${t}">${t}</option>`).join('');
      renderNoteList();
    }
    async function loadNotes(){
      const search=document.getElementById('searchInput').value;
      const project=document.getElementById('projectFilter').value;
      const tag=document.getElementById('tagFilter').value;
      let url='/api/notes?';
      if(search)url+=`search=${encodeURIComponent(search)}&`;
      if(project)url+=`project=${encodeURIComponent(project)}&`;
      if(tag)url+=`tag=${encodeURIComponent(tag)}&`;
      notes=await(await fetch(url)).json();
      renderNoteList();
    }
    function renderNoteList(){
      document.getElementById('noteList').innerHTML=notes.length?notes.map(n=>`<div class="note-item${n.id===currentId?' active':''}" onclick="loadNote('${n.id}')"><h4>${n.title}</h4><div class="meta">${new Date(n.date).toLocaleDateString()} • <span class="project-badge">${n.project||'General'}</span></div><div class="tags">${(n.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>`).join(''):'<div class="empty">No notes found</div>';
    }
    async function loadNote(id){
      currentId=id;
      const n=await(await fetch(`/api/notes/${id}`)).json();
      document.getElementById('editorArea').innerHTML=`
        <div class="form-row"><div class="form-group"><label>Title</label><input id="noteTitle" value="${n.title}" oninput="saveCurrent()"></div><div class="form-group"><label>Date</label><input type="date" id="noteDate" value="${n.date}" oninput="saveCurrent()"></div></div>
        <div class="form-row"><div class="form-group"><label>Project</label><select id="noteProject" onchange="saveCurrent()"><option value="">General</option>${projects.map(p=>`<option value="${p}"${n.project===p?' selected':''}>${p}</option>`).join('')}</select></div><div class="form-group"><label>Tags (comma separated)</label><input id="noteTags" value="${(n.tags||[]).join(', ')}" oninput="saveCurrent()"></div></div>
        <div class="form-group"><label>Notes</label><textarea id="noteContent" oninput="saveCurrent()">${n.content}</textarea></div>
        <div class="action-items">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><label style="font-weight:500">Action Items</label><button class="btn btn-primary btn-sm" onclick="addActionItem()">+ Add</button></div>
          <div id="actionItemsList">${(n.actionItems||[]).map((a,i)=>actionItemHtml(a,i)).join('')}</div>
        </div>
        <div style="margin-top:20px;display:flex;gap:8px"><button class="btn btn-danger" onclick="deleteNote('${n.id}')">Delete Note</button></div>`;
      renderNoteList();
    }
    function actionItemHtml(a,i){return`<div class="action-item${a.done?' done':''}"><input type="checkbox"${a.done?' checked':''} onchange="toggleAction(${i})"><span>${a.text}</span><button class="remove" onclick="removeAction(${i})">×</button></div>`;}
    async function saveCurrent(){
      if(!currentId)return;
      const content=document.getElementById('noteContent')?.value;
      if(content===undefined)return;
      const body={title:document.getElementById('noteTitle').value,date:document.getElementById('noteDate').value,project:document.getElementById('noteProject').value,tags:document.getElementById('noteTags').value.split(',').map(t=>t.trim()).filter(Boolean),content};
      await fetch(`/api/notes/${currentId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    }
    async function newNote(){
      const title=prompt('Note title:','Meeting Notes - '+new Date().toLocaleDateString());
      if(!title)return;
      const res=await fetch('/api/notes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,date:new Date().toISOString().split('T')[0],project:document.getElementById('projectFilter').value||'',content:'',actionItems:[],tags:[]})});
      const n=await res.json();
      loadData();loadNote(n.id);
    }
    async function deleteNote(id){
      if(!confirm('Delete this note?'))return;
      await fetch(`/api/notes/${id}`,{method:'DELETE'});
      currentId=null;document.getElementById('editorArea').innerHTML='<div class="empty">Select or create a note to get started</div>';
      loadData();
    }
    async function toggleAction(idx){
      const n=await(await fetch(`/api/notes/${currentId}`)).json();
      n.actionItems[idx].done=!n.actionItems[idx].done;
      await fetch(`/api/notes/${currentId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({actionItems:n.actionItems})});
      loadNote(currentId);
    }
    async function removeAction(idx){
      const n=await(await fetch(`/api/notes/${currentId}`)).json();
      n.actionItems.splice(idx,1);
      await fetch(`/api/notes/${currentId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({actionItems:n.actionItems})});
      loadNote(currentId);
    }
    async function addActionItem(){
      const text=prompt('Action item:');if(!text)return;
      const n=await(await fetch(`/api/notes/${currentId}`)).json();
      n.actionItems.push({text,done:false});
      await fetch(`/api/notes/${currentId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({actionItems:n.actionItems})});
      loadNote(currentId);
    }
    loadData();
  </script>
</body>
</html>
