<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Tracking Calendar</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-hover: #334155;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #6366f1;
      --primary-hover: #818cf8;
      --danger: #ef4444;
      --danger-hover: #f87171;
      --success: #22c55e;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), #a78bfa, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    /* Add Habit Form */
    .add-habit-form {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow);
    }

    .add-habit-form h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: var(--text);
    }

    .form-row {
      display: flex;
      gap: 1rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex: 1;
      min-width: 200px;
    }

    .form-group label {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .form-group input[type="text"] {
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    .form-group input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
    }

    .color-picker-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    input[type="color"] {
      width: 48px;
      height: 48px;
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      background: none;
      padding: 4px;
    }

    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    /* Calendar Navigation */
    .calendar-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1rem 1.5rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
    }

    .calendar-nav h2 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    .nav-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .btn-nav {
      background: var(--surface-hover);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      font-size: 1.25rem;
      transition: all 0.2s;
    }

    .btn-nav:hover {
      background: var(--primary);
    }

    .btn-today {
      background: var(--primary);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.875rem;
    }

    .btn-today:hover {
      background: var(--primary-hover);
    }

    /* Calendar Grid */
    .calendar {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 2rem;
    }

    .calendar-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--bg);
    }

    .calendar-header div {
      padding: 1rem;
      text-align: center;
      font-weight: 600;
      color: var(--text-muted);
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .calendar-day {
      min-height: 120px;
      padding: 0.75rem;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }

    .calendar-day:hover {
      background: var(--surface-hover);
    }

    .calendar-day.other-month {
      opacity: 0.3;
      pointer-events: none;
    }

    .calendar-day.today {
      background: rgba(99, 102, 241, 0.1);
      border-color: var(--primary);
    }

    .day-number {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }

    .today .day-number {
      background: var(--primary);
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .day-habits {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .habit-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      transition: transform 0.15s;
    }

    .habit-dot:hover {
      transform: scale(1.3);
    }

    /* Habits List */
    .habits-section {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    .habits-section h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
    }

    .habits-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .habit-card {
      background: var(--bg);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: transform 0.2s;
    }

    .habit-card:hover {
      transform: translateX(4px);
    }

    .habit-color-bar {
      width: 6px;
      height: 50px;
      border-radius: 3px;
    }

    .habit-info {
      flex: 1;
    }

    .habit-name {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 0.25rem;
    }

    .habit-meta {
      display: flex;
      gap: 1.5rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .habit-stat {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .habit-stat .icon {
      font-size: 1rem;
    }

    .streak-value {
      color: var(--success);
      font-weight: 700;
    }

    .progress-bar-container {
      width: 120px;
      height: 8px;
      background: var(--surface-hover);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 0.8rem;
      color: var(--text-muted);
      min-width: 40px;
      text-align: right;
    }

    .btn-delete {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s;
    }

    .btn-delete:hover {
      background: var(--danger);
      color: white;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    /* Day Detail Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .modal h3 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
    }

    .modal-habit-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem;
      background: var(--bg);
      border-radius: 8px;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .modal-habit-item:hover {
      background: var(--surface-hover);
    }

    .modal-habit-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .modal-habit-color {
      width: 20px;
      height: 20px;
      border-radius: 50%;
    }

    .modal-check {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .modal-check.checked {
      border-color: var(--success);
      background: var(--success);
    }

    .modal-check.checked::after {
      content: "✓";
      color: white;
      font-weight: bold;
    }

    .modal-close {
      margin-top: 1rem;
      width: 100%;
    }

    @media (max-width: 768px) {
      body { padding: 1rem; }
      header h1 { font-size: 1.75rem; }
      .form-row { flex-direction: column; }
      .calendar-day { min-height: 80px; padding: 0.5rem; }
      .day-number { font-size: 0.75rem; }
      .habit-dot { width: 10px; height: 10px; }
      .habit-meta { flex-direction: column; gap: 0.5rem; }
      .progress-bar-container { width: 80px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Habit Tracker</h1>
      <p>Build better habits, one day at a time</p>
    </header>

    <form class="add-habit-form" id="addHabitForm">
      <h2>Add New Habit</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="habitName">Habit Name</label>
          <input type="text" id="habitName" placeholder="e.g., Morning Exercise" required>
        </div>
        <div class="form-group" style="flex: 0; min-width: auto;">
          <label>Color</label>
          <div class="color-picker-wrapper">
            <input type="color" id="habitColor" value="#6366f1">
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Add Habit</button>
      </div>
    </form>

    <div class="calendar-nav">
      <div class="nav-buttons">
        <button class="btn-nav" id="prevMonth">&lt;</button>
      </div>
      <h2 id="monthYear"></h2>
      <div class="nav-buttons">
        <button class="btn btn-today" id="todayBtn">Today</button>
        <button class="btn-nav" id="nextMonth">&gt;</button>
      </div>
    </div>

    <div class="calendar">
      <div class="calendar-header">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="habits-section">
      <h2>Your Habits</h2>
      <div class="habits-list" id="habitsList"></div>
    </div>
  </div>

  <div class="modal-overlay" id="dayModal">
    <div class="modal">
      <h3 id="modalTitle">Habits for Date</h3>
      <div id="modalHabits"></div>
      <button class="btn btn-primary modal-close" id="modalClose">Close</button>
    </div>
  </div>

  <script>
    const API_BASE = "";
    let habits = [];
    let logs = [];
    let currentDate = new Date();
    let selectedDate = null;

    const monthNames = ["January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"];

    async function fetchData() {
      try {
        const res = await fetch(`${API_BASE}/api/habits`);
        const data = await res.json();
        habits = data.habits || [];
        logs = data.logs || [];
        renderAll();
      } catch (e) {
        console.error("Failed to fetch data:", e);
      }
    }

    async function addHabit(name, color) {
      try {
        const res = await fetch(`${API_BASE}/api/habits`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, color }),
        });
        if (res.ok) {
          document.getElementById("habitName").value = "";
          await fetchData();
        }
      } catch (e) {
        console.error("Failed to add habit:", e);
      }
    }

    async function deleteHabit(id) {
      try {
        const res = await fetch(`${API_BASE}/api/habits/${id}`, { method: "DELETE" });
        if (res.ok) await fetchData();
      } catch (e) {
        console.error("Failed to delete habit:", e);
      }
    }

    async function toggleLog(habitId, date) {
      try {
        const res = await fetch(`${API_BASE}/api/habits/${habitId}/log`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ date }),
        });
        if (res.ok) await fetchData();
      } catch (e) {
        console.error("Failed to toggle log:", e);
      }
    }

    function isLogged(habitId, date) {
      return logs.some((l) => l.habitId === habitId && l.date === date);
    }

    function calculateStreak(habitId) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      let streak = 0;
      let checkDate = new Date(today);

      // If not completed today, start checking from yesterday
      if (!isLogged(habitId, formatDate(checkDate))) {
        checkDate.setDate(checkDate.getDate() - 1);
      }

      while (isLogged(habitId, formatDate(checkDate))) {
        streak++;
        checkDate.setDate(checkDate.getDate() - 1);
      }
      return streak;
    }

    function calculateProgress(habitId) {
      const today = new Date();
      const habit = habits.find((h) => h.id === habitId);
      if (!habit) return 0;

      const created = new Date(habit.createdAt);
      created.setHours(0, 0, 0, 0);
      today.setHours(0, 0, 0, 0);

      const totalDays = Math.floor((today - created) / (1000 * 60 * 60 * 24)) + 1;
      if (totalDays <= 0) return 0;

      const completedDays = logs.filter((l) => l.habitId === habitId).length;
      return Math.min(100, Math.round((completedDays / totalDays) * 100));
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById("monthYear").textContent = `${monthNames[month]} ${year}`;

      const grid = document.getElementById("calendarGrid");
      grid.innerHTML = "";

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const startDay = firstDay.getDay();
      const daysInMonth = lastDay.getDate();

      // Previous month days
      const prevMonthLastDay = new Date(year, month, 0).getDate();
      for (let i = startDay - 1; i >= 0; i--) {
        const day = prevMonthLastDay - i;
        const date = new Date(year, month - 1, day);
        grid.appendChild(createDayCell(date, true));
      }

      // Current month days
      for (let day = 1; day <= daysInMonth; day++) {
        const date = new Date(year, month, day);
        const isToday = date.getTime() === today.getTime();
        grid.appendChild(createDayCell(date, false, isToday));
      }

      // Next month days
      const totalCells = grid.children.length;
      const remaining = (7 - (totalCells % 7)) % 7;
      for (let day = 1; day <= remaining; day++) {
        const date = new Date(year, month + 1, day);
        grid.appendChild(createDayCell(date, true));
      }
    }

    function createDayCell(date, otherMonth, isToday = false) {
      const cell = document.createElement("div");
      cell.className = "calendar-day" + (otherMonth ? " other-month" : "") + (isToday ? " today" : "");

      const dateStr = formatDate(date);
      cell.innerHTML = `<div class="day-number">${date.getDate()}</div>`;

      if (!otherMonth && habits.length > 0) {
        const dotsContainer = document.createElement("div");
        dotsContainer.className = "day-habits";

        habits.forEach((habit) => {
          if (isLogged(habit.id, dateStr)) {
            const dot = document.createElement("div");
            dot.className = "habit-dot";
            dot.style.background = habit.color;
            dot.title = habit.name;
            dotsContainer.appendChild(dot);
          }
        });

        if (dotsContainer.children.length > 0) {
          cell.appendChild(dotsContainer);
        }
      }

      cell.addEventListener("click", () => openDayModal(date));
      return cell;
    }

    function renderHabitsList() {
      const container = document.getElementById("habitsList");

      if (habits.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">🎯</div>
            <p>No habits yet. Add your first habit above!</p>
          </div>
        `;
        return;
      }

      container.innerHTML = habits
        .map(
          (habit) => {
            const streak = calculateStreak(habit.id);
            const progress = calculateProgress(habit.id);
            const totalLogs = logs.filter((l) => l.habitId === habit.id).length;

            return `
            <div class="habit-card">
              <div class="habit-color-bar" style="background: ${habit.color}"></div>
              <div class="habit-info">
                <div class="habit-name">${escapeHtml(habit.name)}</div>
                <div class="habit-meta">
                  <div class="habit-stat">
                    <span class="icon">🔥</span>
                    <span class="streak-value">${streak} day streak</span>
                  </div>
                  <div class="habit-stat">
                    <span class="icon">✓</span>
                    <span>${totalLogs} completions</span>
                  </div>
                </div>
              </div>
              <div class="progress-bar-container">
                <div class="progress-bar" style="width: ${progress}%; background: ${habit.color}"></div>
              </div>
              <div class="progress-text">${progress}%</div>
              <button class="btn-delete" onclick="deleteHabit('${habit.id}')">Delete</button>
            </div>
          `;
        }
        )
        .join("");
    }

    function openDayModal(date) {
      selectedDate = formatDate(date);
      const dayName = date.toLocaleDateString("en-US", { weekday: "long" });
      const monthName = date.toLocaleDateString("en-US", { month: "long" });
      document.getElementById("modalTitle").textContent = `${dayName}, ${monthName} ${date.getDate()}`;

      const container = document.getElementById("modalHabits");
      if (habits.length === 0) {
        container.innerHTML = "<p style='color: var(--text-muted);'>No habits to track.</p>";
      } else {
        container.innerHTML = habits
          .map((habit) => {
            const logged = isLogged(habit.id, selectedDate);
            return `
            <div class="modal-habit-item" onclick="toggleModalHabit('${habit.id}', '${selectedDate}')">
              <div class="modal-habit-left">
                <div class="modal-habit-color" style="background: ${habit.color}"></div>
                <span>${escapeHtml(habit.name)}</span>
              </div>
              <div class="modal-check ${logged ? "checked" : ""}"></div>
            </div>
          `;
          })
          .join("");
      }

      document.getElementById("dayModal").classList.add("active");
    }

    async function toggleModalHabit(habitId, date) {
      await toggleLog(habitId, date);
      openDayModal(new Date(date + "T00:00:00"));
    }

    function renderAll() {
      renderCalendar();
      renderHabitsList();
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    // Event Listeners
    document.getElementById("addHabitForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const name = document.getElementById("habitName").value.trim();
      const color = document.getElementById("habitColor").value;
      if (name) addHabit(name, color);
    });

    document.getElementById("prevMonth").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    });

    document.getElementById("nextMonth").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    });

    document.getElementById("todayBtn").addEventListener("click", () => {
      currentDate = new Date();
      renderCalendar();
    });

    document.getElementById("dayModal").addEventListener("click", (e) => {
      if (e.target.id === "dayModal") {
        document.getElementById("dayModal").classList.remove("active");
      }
    });

    document.getElementById("modalClose").addEventListener("click", () => {
      document.getElementById("dayModal").classList.remove("active");
    });

    // Initialize
    fetchData();
  </script>
</body>
</html>
