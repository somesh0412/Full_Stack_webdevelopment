<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelVault | Gallery Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="container nav-flex">
            <h1 class="logo">Pixel<span>Vault</span></h1>
            <div class="controls">
                <input type="text" id="search-bar" placeholder="Search gallery..." oninput="filterImages()">
                <label for="upload-input" class="btn-primary">Upload Image</label>
                <input type="file" id="upload-input" accept="image/*" hidden>
            </div>
        </div>
    </nav>

    <main class="container">
        <div id="image-grid" class="image-grid">
            </div>
    </main>

    <div id="lightbox" class="modal" onclick="closeLightbox()">
        <span class="close">&times;</span>
        <img class="modal-content" id="lightbox-img">
        <div id="caption"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
