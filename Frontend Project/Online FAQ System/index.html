<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupportCenter | FAQ</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="faq-header">
        <div class="container">
            <h1>How can we help?</h1>
            <div class="search-wrapper">
                <input type="text" id="faq-search" placeholder="Search for answers (e.g., 'payment', 'account')..." oninput="searchFAQ()">
            </div>
        </div>
    </header>

    <main class="container">
        <div id="faq-container" class="faq-list">
            </div>

        <div id="no-results" class="hidden">
            <p>No matches found. Try different keywords or contact support.</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
