<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudNotes | Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

    <header>
        <nav class="navbar">
            <h1 class="logo">Cloud<span>Notes</span></h1>
            <button id="add-note-btn" class="btn-primary">
                <span class="material-symbols-outlined">add</span> New Note
            </button>
        </nav>
    </header>

    <main class="container">
        <div id="notes-grid" class="notes-grid">
            </div>
    </main>

    <div id="note-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add New Note</h2>
                <span class="close-btn">&times;</span>
            </div>
            <form id="note-form">
                <input type="text" id="title-input" placeholder="Title" required>
                <textarea id="content-input" placeholder="Take a note..." required></textarea>
                <button type="submit" class="btn-block">Save Note</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
