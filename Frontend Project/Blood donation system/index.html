<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Donation Management System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <span class="logo">🩸 BloodSync <span>Admin</span></span>
        </div>
    </nav>

    <div class="dashboard-grid">
        <section class="form-section card">
            <h2>Register New Donor</h2>
            <form id="donorForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" min="18" max="65" placeholder="18-65 only" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="bloodType">Blood Type</label>
                        <select id="bloodType" required>
                            <option value="">Select</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="units">Units Donated (mL)</label>
                        <input type="number" id="units" min="100" max="1000" step="50" placeholder="450" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="contact">Contact Number</label>
                    <input type="tel" id="contact" placeholder="10-digit number" required>
                </div>
                <button type="submit" class="btn-submit">Register & Add Inventory</button>
            </form>
        </section>

        <section class="inventory-section card">
            <h2>Current Blood Stock</h2>
            <div class="stock-grid" id="stockContainer">
                </div>
        </section>
    </div>

    <div class="table-container card">
        <h2>Recent Donor Log</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Blood Type</th>
                        <th>Units</th>
                        <th>Contact</th>
                        <th>Registration Date</th>
                    </tr>
                </thead>
                <tbody id="donorTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
