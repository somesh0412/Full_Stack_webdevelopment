<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Student Result System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <h2 class="logo">Result System</h2>
        <div class="nav-right">
            <span id="userName">Welcome, User</span>
            <button id="logoutBtn" class="btn-logout">Logout</button>
        </div>
    </header>

    <!-- Layout -->
    <div class="container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <ul>
                <li><a href="dashboard.html">🏠 Home</a></li>
                <li><a href="results.html">📊 Results</a></li>
                <li><a href="add-result.html" id="adminMenu">➕ Add Result</a></li>
                <li><a href="profile.html" class="active">👤 Profile</a></li>
            </ul>
        </aside>

        <!-- Content -->
        <main class="content">

            <div class="card profile-card">
                <h1>My Profile</h1>

                <div class="profile-info">
                    
                    <div class="profile-item">
                        <label>Name:</label>
                        <p id="profileName">-</p>
                    </div>

                    <div class="profile-item">
                        <label>Email:</label>
                        <p id="profileEmail">-</p>
                    </div>

                    <div class="profile-item">
                        <label>Role:</label>
                        <p id="profileRole">-</p>
                    </div>

                    <div class="profile-item">
                        <label>Roll No:</label>
                        <p id="profileRoll">-</p>
                    </div>

                    <div class="profile-item">
                        <label>Class:</label>
                        <p id="profileClass">-</p>
                    </div>

                </div>
            </div>

        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
