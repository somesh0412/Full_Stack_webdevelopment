<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RevYou | Honest Product Insights</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="container nav-flex">
            <h1 class="logo">Rev<span>You</span></h1>
            <button id="add-review-btn" class="btn-primary">Write a Review</button>
        </div>
    </header>

    <main class="container">
        <div id="review-grid" class="review-grid">
            </div>
    </main>

    <div id="review-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Share Your Opinion</h2>
            <form id="review-form">
                <input type="text" id="p-name" placeholder="Product Name" required>
                <div class="rating-input">
                    <label>Rating:</label>
                    <select id="p-rating">
                        <option value="5">5 Stars - Excellent</option>
                        <option value="4">4 Stars - Good</option>
                        <option value="3">3 Stars - Average</option>
                        <option value="2">2 Stars - Poor</option>
                        <option value="1">1 Star - Terrible</option>
                    </select>
                </div>
                <div class="pros-cons">
                    <input type="text" id="p-pros" placeholder="Main Pro (e.g. Battery Life)" required>
                    <input type="text" id="p-cons" placeholder="Main Con (e.g. Price)" required>
                </div>
                <textarea id="p-desc" placeholder="Write your full experience here..." required></textarea>
                <button type="submit" class="btn-block">Post Review</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
