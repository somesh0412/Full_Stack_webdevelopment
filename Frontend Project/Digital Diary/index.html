<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenDiary | My Private Thoughts</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Zen<span>Diary</span></h2>
                <button id="new-entry-btn">+ New Page</button>
            </div>
            <div id="entry-list" class="entry-list">
                </div>
        </aside>

        <main class="editor-container">
            <header class="editor-header">
                <span id="current-date">Sunday, April 12, 2026</span>
                <button id="save-btn" class="btn-save">Save Entry</button>
            </header>
            
            <input type="text" id="entry-title" placeholder="Entry Title..." autocomplete="off">
            <textarea id="entry-body" placeholder="Dear Diary, today was..."></textarea>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
