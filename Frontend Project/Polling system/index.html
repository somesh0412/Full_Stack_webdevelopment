<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PollStream | Real-Time Opinions</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="poll-container">
        <header>
            <span class="badge">Live Poll</span>
            <h1 id="poll-question">What is your preferred programming language for 2026?</h1>
        </header>

        <div id="poll-options" class="poll-options">
            </div>

        <div id="results-container" class="hidden">
            <h3>Current Results</h3>
            <div id="results-list"></div>
            <button onclick="resetPoll()" class="btn-reset">Vote Again (Debug)</button>
        </div>

        <footer>
            <p id="total-votes">Total Votes: 0</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
