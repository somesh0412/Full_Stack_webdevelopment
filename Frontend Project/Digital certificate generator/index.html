<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CertiGen | Instant Certificates</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <aside class="editor-panel">
            <header>
                <h1>Certi<span>Gen</span></h1>
                <p>Generate professional digital credentials instantly.</p>
            </header>

            <form id="cert-form">
                <div class="input-group">
                    <label>Recipient Name</label>
                    <input type="text" id="student-name" placeholder="Somesh Ramesh Raut" required>
                </div>
                <div class="input-group">
                    <label>Course Name</label>
                    <input type="text" id="course-name" placeholder="Full Stack Web Development" required>
                </div>
                <div class="input-group">
                    <label>Issue Date</label>
                    <input type="date" id="issue-date" required>
                </div>
                
                <button type="button" class="btn-preview" onclick="generateCertificate()">Update Preview</button>
                <button type="button" class="btn-download" onclick="downloadCertificate()">Download PNG</button>
            </form>
        </aside>

        <main class="preview-panel">
            <div class="canvas-wrapper">
                <canvas id="certificate-canvas"></canvas>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
