<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Address Book</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <span class="logo">📇 Address<span>Book</span></span>
        </div>
    </nav>

    <div class="main-layout">
        <section class="form-section card">
            <h2>Add New Contact</h2>
            <form id="contactForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="John Doe" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="phoneNumber">Phone Number</label>
                        <input type="tel" id="phoneNumber" placeholder="123-456-7890" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="Personal">Personal</option>
                            <option value="Work">Work</option>
                            <option value="Family">Family</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="emailAddress">Email Address</label>
                    <input type="email" id="emailAddress" placeholder="john.doe@example.com" required>
                </div>
                <div class="form-group">
                    <label for="physicalAddress">Home/Office Address</label>
                    <input type="text" id="physicalAddress" placeholder="123 Main St, City" required>
                </div>
                <button type="submit" class="btn-submit">Save Contact</button>
            </form>
        </section>

        <section class="directory-section card">
            <div class="section-header">
                <h2>Contact Directory</h2>
                <div class="search-wrapper">
                    <input type="text" id="searchInput" placeholder="Search by name, email, or category..." onkeyup="searchContacts()">
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Contact Details</th>
                            <th>Category</th>
                            <th>Address</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="contactTableBody">
                        </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
