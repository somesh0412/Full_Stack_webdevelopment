<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookEase | Seamless Appointments</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <section class="booking-card">
            <header>
                <h1>Book an Appointment</h1>
                <p>Select a service and your preferred time.</p>
            </header>

            <form id="appointment-form">
                <div class="input-group">
                    <label>Service</label>
                    <select id="service-type" required>
                        <option value="Consultation">General Consultation</option>
                        <option value="Technical Design">Technical Design Review</option>
                        <option value="Project Support">Project Support</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>Date</label>
                        <input type="date" id="book-date" required>
                    </div>
                    <div class="input-group">
                        <label>Time Slot</label>
                        <select id="book-time" required>
                            <option value="09:00 AM">09:00 AM</option>
                            <option value="11:00 AM">11:00 AM</option>
                            <option value="02:00 PM">02:00 PM</option>
                            <option value="04:00 PM">04:00 PM</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="user-name" placeholder="Enter your name" required>
                </div>

                <button type="submit" class="btn-primary">Confirm Booking</button>
            </form>
        </section>

        <section class="dashboard">
            <h3>Your Appointments</h3>
            <div id="appointment-list" class="appointment-list">
                </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
